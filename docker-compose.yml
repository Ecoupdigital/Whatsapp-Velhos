services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: velhos-backend
    restart: unless-stopped
    volumes:
      - velhos-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/velhos.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: velhos-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  velhos-data:
